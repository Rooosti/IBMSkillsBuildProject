services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: steamrecommender-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-steamrecommender}
      POSTGRES_USER: ${POSTGRES_USER:-steamapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-steamapp_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-steamapp} -d ${POSTGRES_DB:-steamrecommender}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
